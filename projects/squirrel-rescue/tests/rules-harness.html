<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squirrel Rescue Rules Harness</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            padding: 32px;
            font-family: "Segoe UI", sans-serif;
            color: #eff9ff;
            background: linear-gradient(180deg, #102033 0%, #0b141f 100%);
        }

        .shell {
            max-width: 860px;
            margin: 0 auto;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.05);
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
        }

        #summaryText {
            color: rgba(239, 249, 255, 0.78);
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin: 10px 0;
            line-height: 1.6;
        }

        .pass {
            color: #8ff0a4;
        }

        .fail {
            color: #ff8a8a;
        }
    </style>
</head>
<body>
    <main class="shell">
        <h1>Squirrel Rescue Rules Harness</h1>
        <p id="summaryText">Running smoke checks for the base rules engine.</p>
        <ul id="resultsList"></ul>
    </main>

    <script src="../modules/config.js"></script>
    <script src="../modules/storage.js"></script>
    <script src="../modules/rules-engine.js"></script>
    <script src="../modules/input-controller.js"></script>
    <script src="../modules/wave-manager.js"></script>
    <script src="../modules/feedback.js"></script>
    <script src="./rules-harness.js"></script>
</body>
</html>
