<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAGE ON | 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./theme.css">
</head>
<body class="stageon-body" data-page="login">
    <div class="stageon-shell">
        <nav class="stageon-nav">
            <div class="stageon-nav-inner">
                <a class="stageon-brand" href="index.html"><span class="stageon-brand-mark">STAGE</span> ON</a>
                <div class="stageon-nav-links">
                    <a href="index.html">브랜드</a>
                    <a href="login.html" class="active">로그인</a>
                    <a href="signup.html">회원가입</a>
                    <a href="recover.html">비밀번호 찾기</a>
                </div>
            </div>
        </nav>

        <main class="centered-shell">
            <section class="auth-grid">
                <article class="auth-card stageon-card">
                    <span class="eyebrow">Login Mockup</span>
                    <h1 class="auth-heading">다시 돌아온 관객을 위한 로그인</h1>
                    <p class="auth-note">입력 상태, 체크박스, hover/focus, 간단한 프론트 검증 메시지까지 포함한 정적 인증 화면입니다.</p>
                    <form class="form-grid" data-auth-form>
                        <div class="field">
                            <label for="login-id">이메일 또는 아이디</label>
                            <input class="stageon-input" id="login-id" name="identifier" type="text" placeholder="example@stageon.co.kr" data-required>
                        </div>
                        <div class="field">
                            <label for="login-password">비밀번호</label>
                            <input class="stageon-input" id="login-password" name="password" type="password" placeholder="비밀번호 입력" data-required>
                        </div>
                        <label class="stageon-checkbox"><input type="checkbox"><span>아이디 저장</span></label>
                        <button class="stageon-btn" type="submit">로그인</button>
                        <div class="error-text" data-form-error aria-live="polite"></div>
                    </form>
                    <div class="auth-links">
                        <a href="recover.html">비밀번호 찾기</a>
                        <a href="signup.html">회원가입</a>
                    </div>
                </article>
                <aside class="auth-side">
                    <article class="mini-card">
                        <h2>폼 UX 포인트</h2>
                        <p class="auth-note">명확한 라벨, 체크박스 상태 표시, focus outline, 에러 메시지를 정리해 접근성과 입력 경험을 함께 보여줍니다.</p>
                    </article>
                    <article class="mini-card">
                        <h2>서비스 감도</h2>
                        <p class="auth-note">예매 내역 조회, 찜 목록 연동, 쿠폰 적용 같은 후속 흐름이 자연스럽게 이어질 수 있도록 톤을 맞췄습니다.</p>
                    </article>
                </aside>
            </section>
        </main>
    </div>
    <script src="./data-fallback.js"></script>
    <script src="./ui.js"></script>
</body>
</html>
